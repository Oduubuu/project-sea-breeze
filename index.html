<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #main-header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 80px;
            background: transparent;
            color: #ffffff;
            z-index: 1000;
        }
        .header-inner {
            max-width: 1200px;
            margin: 0 auto;

            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100%;
        }
    </style>
</head>
<body>
    <header id="main-header">
        <div class="header-inner">
            <div class="logo"></div>
            <nav>
                <ul class="menu">
                    <li>ABOUT</li>
                    <li>SHOP</li>
                    <li>CONTACT</li>
                </ul>
            </nav>
        </div>
    </header>
</body>
</html>
